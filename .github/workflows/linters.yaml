name: Linters

on:
  workflow_call:
    inputs:
      go-version:
        description: Version of Go to be used to run the linters
        required: false
        type: string
        default: "1.25"

      python-version:
        description: Version of Python to be used to run the linters
        required: false
        type: string
        default: "3.13"

jobs:
  linters:
    runs-on: ubuntu-latest
    name: Linters
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}
      - uses: pre-commit/action@v3.0.1
