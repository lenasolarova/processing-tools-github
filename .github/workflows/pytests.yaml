name: Python tests

on:
  workflow_call:

    inputs:
      coverage:
        description: 'Check the code coverage'
        type: boolean
        default: true

      coverage_threshold:
        description: 'Minimum coverage percentage (0-100)'
        required: false
        type: number
        default: 0

      packages:
        description: 'Package or directory to measure coverage for (passed to --cov). Defaults to current directory.'
        required: false
        type: string
        default: '.'

      requirements_file:
        description: 'Path to pip requirements file'
        required: false
        type: string
        default: 'requirements.txt'

      python_version:
        description: 'Python version to use'
        required: false
        type: string
        default: '3.11'

jobs:
  pytests:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    name: Python tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install dependencies
        run: |
          if [ -f "${{ inputs.requirements_file }}" ]; then
            pip install -r ${{ inputs.requirements_file }}
          fi
          pip install pytest-cov

      - name: Unit tests
        run: pytest --cov=${{ inputs.packages }} --cov-report=xml:coverage.xml

      - name: Retrieve code coverage
        if: inputs.coverage == true
        run: python -m coverage report --fail-under=${{ inputs.coverage_threshold }}

      - name: Push coverage report to Codecov
        if: inputs.coverage == true
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          flags: unit-tests
          files: coverage.xml
          fail_ci_if_error: false
