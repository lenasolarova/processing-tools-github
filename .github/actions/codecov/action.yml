name: Upload coverage to Codecov
description: >
  Upload coverage reports to Codecov using OIDC authentication.
  The calling job must have permissions: id-token: write.

inputs:
  files:
    description: 'Comma-separated list of coverage files to upload (auto-detected if not set)'
    required: false
    default: ''
  flags:
    description: 'Codecov flags to categorize the coverage upload'
    required: false
    default: 'unit-tests'

runs:
  using: composite
  steps:
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        use_oidc: true
        flags: ${{ inputs.flags }}
        files: ${{ inputs.files }}
        fail_ci_if_error: false
